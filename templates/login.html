<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Roommate Matcher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="text-align: center;">
        <h1>Roommate Matcher</h1>
        <h2>Collegiate Co-Living Platform</h2>

        <form method="POST" action="" autocomplete="off" style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
            
            <div style="width: 80%; text-align: left;">
                <label for="name" style="font-weight: 600; display: block; margin-bottom: 6px;">Full Name:</label>
                <input type="text" id="name" name="name" required style="width: 100%; box-sizing: border-box;">
            </div>

            <div style="width: 80%; text-align: left;">
                <label for="college" style="font-weight: 600; display: block; margin-bottom: 6px;">School:</label>
                <select id="college" name="college" required style="width: 100%; box-sizing: border-box;">
                    <option value="" disabled selected>Select your school</option>
                    <optgroup label="UC System">
                        <option value="UCLA">UC Los Angeles (UCLA)</option>
                        <option value="UCSD">UC San Diego (UCSD)</option>
                        <option value="UCR">UC Riverside (UCR)</option>
                        <option value="UCSB">UC Santa Barbara (UCSB)</option>
                        <option value="UCI">UC Irvine (UCI)</option>
                    </optgroup>
                    <optgroup label="CSU System">
                        <option value="CSUF">Cal State Fullerton (CSUF)</option>
                        <option value="CSULB">Cal State Long Beach (CSULB)</option>
                        <option value="CSULA">Cal State LA (CSULA)</option>
                        <option value="CSUN">Cal State Northridge (CSUN)</option>
                        <option value="CPP">Cal Poly Pomona</option>
                        <option value="SDSU">San Diego State (SDSU)</option>
                    </optgroup>
                    <optgroup label="Private">
                        <option value="USC">USC</option>
                        <option value="Pepperdine">Pepperdine</option>
                        <option value="LMU">Loyola Marymount (LMU)</option>
                        <option value="Chapman">Chapman University</option>
                    </optgroup>
                </select>
            </div>

            <div style="width: 80%; text-align: left;">
                <label for="phone" style="font-weight: 600; display: block; margin-bottom: 6px;">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required style="width: 100%; box-sizing: border-box;">
            </div>

            <div style="width: 80%; margin-top: 10px;">
                <button type="submit" style="width: 100%; padding: 16px; background: var(--accent-orange); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer;">
                    Enter Platform →
                </button>
            </div>

        </form>
    </div>
</body>
</html>
